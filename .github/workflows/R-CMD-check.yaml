# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: This workflow is overkill for most R packages and
# check-standard.yaml is likely a better choice.
# usethis::use_github_action("check-standard") will install it.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.MY_GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-hub/actions/debug-shell@v1

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Cold-cache attempt: expected to fail with "Cannot query GitHub, are
      # you offline?". continue-on-error keeps the workflow going so the
      # warm-cache attempt below can run for comparison.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-cold
        continue-on-error: true
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check

      - name: Report cold-cache outcome
        shell: bash
        run: echo "cold-cache outcome = ${{ steps.deps-cold.outcome }}"

      # Warm-cache attempt: metadata DB is now populated, so no metadata burst
      # churns the shared curl connection pool. If the theory holds, it passes.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-warm
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check
          pak-version: devel
