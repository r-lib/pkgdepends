# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: This workflow is overkill for most R packages and
# check-standard.yaml is likely a better choice.
# usethis::use_github_action("check-standard") will install it.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.MY_GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-hub/actions/debug-shell@v1

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: install curl 5.2.3
        shell: Rscript {0}
        run: |
          system("git clone --depth 1 https://github.com/r-lib/pak.git")
          system("R CMD INSTALL pak/src/library/curl")

      # Probe the schannel TLS renegotiation seen on api.github.com POSTs.
      # Each arm runs in its OWN R process (re-exec of this script with an arm
      # name) so curl's process-global, shared connection pool can't leak a
      # reused connection across arms. Within an arm: POST, sleep long enough
      # for GitHub to drop the idle socket, then POST again on the same handle.
      # Verbose output (stderr) is captured in the step log.
      - name: Probe GitHub POST TLS renegotiation (verbose, isolated)
        if: ${{ always() }}
        shell: Rscript {0}
        run: |
          args <- commandArgs(trailingOnly = TRUE)
          self <- sub("^--file=", "",
            grep("^--file=", commandArgs(FALSE), value = TRUE))[1]

          # Two dimensions: how the POST body is issued (cr = customrequest=
          # "POST" + postfields, pkgcache's current pattern; post = canonical
          # postfields/CURLOPT_POST) crossed with TLS version (default vs 1.2).
          arms <- c("cr", "post", "cr_tls12", "post_tls12")

          if (length(args) == 0) {
            # Parent: launch each arm in a fresh process (fresh curl pool).
            rscript <- file.path(R.home("bin"), "Rscript")
            for (arm in arms) {
              cat("\n##########", arm, "(fresh process) ##########\n")
              system2(rscript, c(shQuote(self), arm))
            }
          } else {
            arm <- args[1]
            cr  <- arm %in% c("cr", "cr_tls12")          # use customrequest="POST"?
            tls <- arm %in% c("cr_tls12", "post_tls12")  # pin TLS 1.2?
            # Raw string: backslash-escaped quotes are the JSON escaping, kept
            # verbatim through YAML and R, so the payload is unambiguous.
            q <- r"({"query":"{ repository(owner: \"gaborcsardi\", name: \"tstoml\") { sha: object(expression: \"HEAD\") { oid } } }"})"
            opts <- list(verbose = TRUE, http_version = 2L)
            if (tls) opts$sslversion <- bitwOr(6L, bitwShiftL(6L, 16L))  # TLS 1.2 only (min|max)
            `%||%` <- function(a, b) if (length(a)) a else b
            post <- function(h) {
              curl::handle_setheaders(h,
                Authorization = paste("token", Sys.getenv("GITHUB_PAT")),
                `Content-Type` = "application/json")
              if (cr) {
                curl::handle_setopt(h, customrequest = "POST",
                  postfields = q, postfieldsize = nchar(q))
              } else {
                curl::handle_setopt(h, post = TRUE,
                  postfields = q, postfieldsize = nchar(q))
              }
              r <- curl::curl_fetch_memory("https://api.github.com/graphql", handle = h)
              cat("STATUS:", r$status_code,
                  "BODY:", substr(rawToChar(r$content %||% raw()), 1, 200), "\n")
            }
            h <- do.call(curl::new_handle, opts)
            tryCatch({
              post(h)
              cat("---- sleeping 40s to let GitHub drop the idle connection ----\n")
              Sys.sleep(40)
              post(h)                      # <- reuse attempt
            }, error = function(e) cat("ERROR:", conditionMessage(e), "\n"))
          }

      # Cold-cache attempt: expected to fail with "Cannot query GitHub, are
      # you offline?". continue-on-error keeps the workflow going so the
      # warm-cache attempt below can run for comparison.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-cold
        continue-on-error: true
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check
          pak-version: devel

      - name: Report cold-cache outcome
        shell: bash
        run: echo "cold-cache outcome = ${{ steps.deps-cold.outcome }}"

      # Warm-cache attempt: metadata DB is now populated, so no metadata burst
      # churns the shared curl connection pool. If the theory holds, it passes.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-warm
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check
          pak-version: devel
