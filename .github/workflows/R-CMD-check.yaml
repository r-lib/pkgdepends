# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: This workflow is overkill for most R packages and
# check-standard.yaml is likely a better choice.
# usethis::use_github_action("check-standard") will install it.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.MY_GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-hub/actions/debug-shell@v1

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Probe whether the GitHub GraphQL POST failure is caused by reusing a
      # connection that GitHub closed while it sat idle. Runs standalone (not
      # via pak) so curl's verbose output (stderr) is captured in the step log.
      # POST once, sleep long enough for GitHub to drop the idle socket, then
      # POST again on the SAME handle to force a reuse attempt. Compares the
      # default (maxage_conn = 118s) against maxage_conn = 5s and fresh_connect.
      - name: Probe GitHub POST connection reuse (verbose)
        if: ${{ always() }}
        shell: Rscript {0}
        run: |
          install.packages("curl")
          q <- '{"query":"{ repository(owner: \\"gaborcsardi\\", name: \\"tstoml\\") { sha: object(expression: \\"HEAD\\") { oid } } }"}'
          post <- function(h) {
            curl::handle_setheaders(h,
              Authorization = paste("token", Sys.getenv("GITHUB_PAT")),
              `Content-Type` = "application/json")
            curl::handle_setopt(h, customrequest = "POST",
              postfields = q, postfieldsize = nchar(q))
            r <- curl::curl_fetch_memory("https://api.github.com/graphql", handle = h)
            cat("STATUS:", r$status_code, "\n")
          }
          run <- function(label, hv = 2, ...) {          # hv: 2 = HTTP/1.1, 3 = HTTP/2
            cat("\n==== ", label, " ====\n")
            h <- curl::new_handle(verbose = TRUE, http_version = hv, ...)
            tryCatch({
              post(h)
              cat("---- sleeping 40s to let GitHub drop the idle connection ----\n")
              Sys.sleep(40)
              post(h)                      # <- reuse attempt
            }, error = function(e) cat("ERROR:", conditionMessage(e), "\n"))
          }
          run("HTTP/1.1, default (maxage_conn = 118s)", hv = 2)
          run("HTTP/2,   default (maxage_conn = 118s)", hv = 3)
          run("HTTP/1.1, maxage_conn = 5s", hv = 2, maxage_conn = 5)
          run("HTTP/1.1, fresh_connect + forbid_reuse", hv = 2,
              fresh_connect = TRUE, forbid_reuse = TRUE)

      # Cold-cache attempt: expected to fail with "Cannot query GitHub, are
      # you offline?". continue-on-error keeps the workflow going so the
      # warm-cache attempt below can run for comparison.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-cold
        continue-on-error: true
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check
          pak-version: devel

      - name: Report cold-cache outcome
        shell: bash
        run: echo "cold-cache outcome = ${{ steps.deps-cold.outcome }}"

      # Warm-cache attempt: metadata DB is now populated, so no metadata burst
      # churns the shared curl connection pool. If the theory holds, it passes.
      - uses: r-lib/actions/setup-r-dependencies@v2
        id: deps-warm
        with:
          extra-packages: any::rcmdcheck, asciicast=?ignore-before-r=4.1.0
          needs: check
          pak-version: devel
